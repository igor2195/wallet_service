server:
  port: 8080

spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///wallet
    username: user
    password: password
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      maximum-pool-size: 50  # Увеличили с 20 до 50
      connection-timeout: 30000  # 30 секунд
      validation-timeout: 5000
      leak-detection-threshold: 60000
  jpa:
    show-sql: true
  liquibase:
    change-log: classpath:db/liquibase/changelog-test.xml
    contexts: test
    enabled: true
    defaultSchema: public